env: local
debug: true
use_gemini: false
model_timeout_seconds: 20

model:
  provider: gemini
  model_name: gemini-2.5-pro
  temperature: 0.1
  max_output_tokens: 4096
  module_overrides:
    log_understanding: ""
    cognition_extraction: ""
    evidence_planning: ""
    window_selection: ""
    cognition_evaluation: ""
    report_generation: ""
    promptops: ""

memory:
  provider: chromadb
  persist_dir: ./.chroma
  collections:
    raw_logs: raw_logs
    cognitive_cases: cognitive_cases
    user_profile: user_profile
    active_theses: active_theses
    agent_improvement_notes: agent_improvement_notes

mcp:
  timeout_seconds: 12
  retries: 2
  servers:
    - id: yfinance
      endpoint: stdio via uvx yfmcp@latest
    - id: rss_search
      endpoint: stdio via python3 -m ai_trading_coach.modules.mcp.rss_server_example
    - id: filing
      endpoint: http://localhost:8103
    - id: macro
      endpoint: http://localhost:8107

orchestrator:
  retry:
    max_attempts: 2
    backoff_seconds: 2
  idempotency_ttl_hours: 24

window_selector:
  min_confidence_for_final_judgement: 0.65
  require_follow_up_if_confidence_below: 0.55

paths:
  trace_output_dir: ./trace_logs
  report_output_dir: ./reports
  prompt_registry_path: ./config/prompts
